version: '3.8'

# ================================================================
# Sponge RCA Platform - Docker Compose Configuration
# ================================================================
#
# Complete production-ready deployment with:
# - Sponge RCA application
# - PostgreSQL with pgvector extension
# - Prometheus for metrics
# - Grafana for visualization (optional)
#
# Quick Start:
#   docker-compose up -d
#
# ================================================================

services:
  # ================================================================
  # PostgreSQL Database with pgvector
  # ================================================================
  postgres:
    image: ankane/pgvector:latest
    container_name: sponge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sponge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sponge_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-sponge}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init_db.sql:/docker-entrypoint-initdb.d/01-init_db.sql
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/02-seed_data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sponge-network

  # ================================================================
  # Sponge RCA Application
  # ================================================================
  sponge:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: sponge-rca
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database Configuration
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-sponge}
      DATABASE_USER: ${POSTGRES_USER:-sponge}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-sponge_secure_password}

      # Application Settings
      KB_FILE: /app/data/knowledge_base.xlsx
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SPONGE_MODE: ${SPONGE_MODE:-soap}

      # AWS CloudWatch (optional)
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}

      # DataDog (optional)
      DATADOG_API_KEY: ${DATADOG_API_KEY:-}
      DATADOG_APP_KEY: ${DATADOG_APP_KEY:-}

      # Prometheus Metrics
      PROMETHEUS_PORT: 9090
      ENABLE_METRICS: "true"
    ports:
      - "${SPONGE_HTTP_PORT:-8080}:8080"    # SOAP API
      - "${SPONGE_METRICS_PORT:-9090}:9090" # Prometheus metrics
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./workflows:/app/workflows
      - ./exports:/app/exports
      - ./logs:/app/logs
      - ./knowledge_base:/app/knowledge_base
      - /var/log:/var/log:ro
    networks:
      - sponge-network
    command: ["python", "sponge_app.py", "--mode", "${SPONGE_MODE:-soap}"]

  # ================================================================
  # Prometheus (Metrics Collection)
  # ================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: sponge-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - sponge-network

  # ================================================================
  # Grafana (Visualization)
  # ================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: sponge-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - postgres
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ${GRAFANA_PLUGINS:-}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - sponge-network

  # ================================================================
  # Redis (Optional Caching)
  # ================================================================
  redis:
    image: redis:7-alpine
    container_name: sponge-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - sponge-network

# ================================================================
# Volumes
# ================================================================
volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  redis_data:
    driver: local
  sponge-data:
    driver: local

# ================================================================
# Networks
# ================================================================
networks:
  sponge-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
